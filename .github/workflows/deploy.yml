# Deploy notification-service a producción
# Push a main/master → build → push DOCR → deploy vía SSH (kubectl set image)
# Requiere: deployment notification-service aplicado en K8s; secrets DOCR_TOKEN, GO_PRIVATE_TOKEN, SSH_PRIVATE_KEY, DROPLET_IP
#
# ⚠️ Drift: kubectl set image modifica el deployment en vivo pero NO el YAML del repo (manifest en infra/).

name: Deploy notification-service to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/mc-bootstrap-registry
  IMAGE_NAME: notification-service
  DEPLOYMENT_NAME: notification-service
  CONTAINER_NAME: notification
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/mercadocercano
      GONOSUMDB: github.com/mercadocercano

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.GO_PRIVATE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run tests
        run: go test ./... -race -timeout 120s

      - name: Run vet
        run: go vet ./...

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and Push Image (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          target: production
          provenance: false
          sbom: false
          build-args: |
            GITHUB_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}

      - name: Deploy to K8s with rollback
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
               ${{ env.CONTAINER_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
               -n ${{ env.NAMESPACE }} && \
             kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
               -n ${{ env.NAMESPACE }} --timeout=300s || \
             (kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} && \
              echo 'Rollback triggered' && exit 1)"

      - name: Verify Pod Ready
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl wait pod -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} \
               --for=condition=ready --timeout=60s && \
             IMAGE=\$(kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} \
               -o jsonpath='{.items[0].spec.containers[0].image}') && \
             echo \"Image: \$IMAGE\" && \
             echo '✅ notification-service is running and healthy'"
