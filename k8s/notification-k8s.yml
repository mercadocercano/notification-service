# notification-service — Deployment + Service (k3s prod).
# El CD (.github/workflows/deploy.yml) hace `kubectl set image` sobre este deployment.
# Migraciones in-app (golang-migrate) corren al arranque contra notification_db.
# Async/SQS DESHABILITADO (SQS_ENABLED ausente) hasta tener cuenta AWS — path sync (Resend) activo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      imagePullSecrets:
        - name: do-registry
      containers:
        - name: notification
          image: registry.digitalocean.com/mc-bootstrap-registry/notification-service:bootstrap
          ports:
            - containerPort: 8282
          env:
            - name: SERVER_PORT
              value: "8282"
            - name: SERVER_MODE
              value: "release"
            - name: DATABASE_HOST
              value: "postgres"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: "postgres"
            - name: DATABASE_NAME
              value: "notification_db"
            - name: DATABASE_SSL_MODE
              value: "disable"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: RESEND_API_KEY
            - name: RESEND_FROM_EMAIL
              value: "noreply@mercadocercano.com"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iam-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: METRICS_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8282
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8282
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8282
      targetPort: 8282
  type: ClusterIP
